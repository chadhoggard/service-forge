name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.0)"
        required: false
        default: ""
      environment:
        description: "Target environment"
        required: false
        default: "production"
      deployment_id:
        description: "ServiceForge deployment ID to update on completion"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: serviceforge-backend
  ECR_FRONTEND_REPO: serviceforge-frontend
  ECS_CLUSTER: serviceforge-production-cluster
  BACKEND_SERVICE: serviceforge-production-backend
  FRONTEND_SERVICE: serviceforge-production-frontend
  BACKEND_TASK_FAMILY: serviceforge-production-backend
  FRONTEND_TASK_FAMILY: serviceforge-production-frontend
  SERVICEFORGE_API: http://serviceforge-production-alb-1977889151.us-east-1.elb.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build & push backend ─────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.sha }}"
          fi
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE_URI="${REGISTRY}/${{ env.ECR_BACKEND_REPO }}:${TAG}"
          docker build -t "$IMAGE_URI" ./backend
          docker push "$IMAGE_URI"
          # Also tag as latest
          docker tag "$IMAGE_URI" "${REGISTRY}/${{ env.ECR_BACKEND_REPO }}:latest"
          docker push "${REGISTRY}/${{ env.ECR_BACKEND_REPO }}:latest"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

  # ── Build & push frontend ────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.sha }}"
          fi
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build & push frontend image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE_URI="${REGISTRY}/${{ env.ECR_FRONTEND_REPO }}:${TAG}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ env.SERVICEFORGE_API }}" \
            -t "$IMAGE_URI" \
            ./frontend
          docker push "$IMAGE_URI"
          docker tag "$IMAGE_URI" "${REGISTRY}/${{ env.ECR_FRONTEND_REPO }}:latest"
          docker push "${REGISTRY}/${{ env.ECR_FRONTEND_REPO }}:latest"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

  # ── Deploy backend to ECS ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build-backend]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.BACKEND_TASK_FAMILY }} \
            --query taskDefinition \
            > task-def-backend.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-backend.json
          container-name: backend
          image: ${{ needs.build-backend.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Deploy frontend to ECS ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.FRONTEND_TASK_FAMILY }} \
            --query taskDefinition \
            > task-def-frontend.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-frontend.json
          container-name: frontend
          image: ${{ needs.build-frontend.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Callback to ServiceForge ─────────────────────────────────────────────
  notify-serviceforge:
    name: Update ServiceForge Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && github.event.inputs.deployment_id != ''

    steps:
      - name: Determine final status
        id: status
        run: |
          BACKEND="${{ needs.deploy-backend.result }}"
          FRONTEND="${{ needs.deploy-frontend.result }}"
          if [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            echo "status=succeeded" >> $GITHUB_OUTPUT
            echo "notes=Deployed backend and frontend successfully via GitHub Actions (run ${{ github.run_id }})" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "notes=Deployment failed — backend: ${BACKEND}, frontend: ${FRONTEND} (run ${{ github.run_id }})" >> $GITHUB_OUTPUT
          fi

      - name: Patch ServiceForge deployment record
        run: |
          curl -s -X PATCH \
            "${{ env.SERVICEFORGE_API }}/api/deployments/${{ github.event.inputs.deployment_id }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "${{ steps.status.outputs.status }}",
              "notes": "${{ steps.status.outputs.notes }}"
            }'
